name: QuackleScrabble
options:
  bundleIdPrefix: com.bef
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  createIntermediateGroups: true
  generateSchemes: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CLANG_CXX_LANGUAGE_STANDARD: c++17
    CLANG_CXX_LIBRARY: libc++
    GCC_PREPROCESSOR_DEFINITIONS:
      - QUACKLE_DATAMANAGER_ACCESS=1

targets:
  QuackleScrabble:
    type: application
    platform: iOS
    sources:
      - path: QuackleScrabble
        type: group
      - path: libquackle
        type: group
        compilerFlags:
          - "-std=c++17"
          - "-Wno-deprecated"
          - "-Wno-format-security"
          - "-Wno-unused-variable"
          - "-Wno-unreachable-code"
      - path: data
        type: folder
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: QuackleScrabble/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bef.quacklescrabble
        DEVELOPMENT_TEAM: Y9X24NP2Y3
        SWIFT_OBJC_BRIDGING_HEADER: QuackleScrabble-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/libquackle
          - $(SRCROOT)/QuackleScrabble/Bridge
        USER_HEADER_SEARCH_PATHS:
          - $(SRCROOT)/libquackle
        CLANG_CXX_LANGUAGE_STANDARD: c++17
        TARGETED_DEVICE_FAMILY: "1"
